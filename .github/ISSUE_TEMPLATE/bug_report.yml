name: Bug report
description: Something broke. Help us reproduce it.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The faster we can reproduce, the faster we ship a fix.

        For security vulnerabilities, please use [SECURITY.md](../../SECURITY.md) instead — do not file a public issue.

  - type: input
    id: sdk-version
    attributes:
      label: Package version
      description: Output of `npm list @tessera-llm/vercel-ai`.
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: ai-sdk-version
    attributes:
      label: Vercel AI SDK version
      description: Output of `npm list ai @ai-sdk/openai` etc.
      placeholder: e.g. ai 5.0.32
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: e.g. Node 22.5.1
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimum reproduction
      description: Smallest snippet that reproduces the bug. Include any required environment variables (mask secrets).
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include stack traces, HTTP status codes, response bodies if relevant.
    validations:
      required: true

  - type: input
    id: client-id
    attributes:
      label: client_id (only if bug touches measurement / billing)
      description: Visible at `/portal/billing` in the dashboard. Helps us trace the request in proxy logs.
      placeholder: optional

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues before filing this one.
          required: true
        - label: I removed any secrets (API keys, tokens) from the reproduction snippet.
          required: true
